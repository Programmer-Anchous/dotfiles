preload = /home/anchous/Pictures/wallpapers/fur-trees.jpg
#if more than one preload is desired then continue to preload other backgrounds

#set the default wallpaper(s) seen on initial workspace(s) --depending on the number of monitors used
# wallpaper = eDP-1,/home/anchous/Pictures/wallpapers/fur-trees.jpg
# wallpaper = HDMI-A-1,/home/anchous/Pictures/wallpapers/fur-trees.jpg
wallpaper {
    monitor = eDP-1
    path = /home/anchous/Pictures/wallpapers/fur-trees.jpg
    fit_mode = cover
}
wallpaper {
    monitor = HDMI-A-1
    path = /home/anchous/Pictures/wallpapers/fur-trees.jpg
    fit_mode = cover
}

#enable splash text rendering over the wallpaper
splash = false

#fully disable ipc
# ipc = off

