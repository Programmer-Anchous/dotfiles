
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/

# monitor=,preferred,auto,auto
monitor=,preferred,auto,1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = alacritty
$shell = fish
$fileManager = ranger
$menu = rofi -show drun
$windows = rofi -show window
$taskman = btop
$browser = firefox

# dynamic borders
# exec-once = ~/.config/hypr/dynamic-borders.sh

# Execute your favorite apps at launch
exec-once = waybar & hyprpaper  & nm-applet

# polkit agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# keyring
exec-once = "/usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh"

## Startup/Reload execs
# exec-once = [workspace 1] $terminal -e $shell
# exec-once = [workspace 2] obsidian
# exec-once = [workspace 3] $terminal -e $shell
# exec-once = [workspace 4] $browser
# exec-once = [workspace 5] Telegram
# exec-once = [workspace 10] $terminal -e btop
# exec-once = [workspace 10] pavucontrol

## Rules for opening apps in specific workspaces
windowrule = match:class obsidian, workspace 2 silent
windowrule = match:class org.telegram.desktop, workspace 5 silent
windowrule = match:class discord, workspace 6 silent
windowrule = match:class (Tor Browser), workspace 6 silent
windowrule = match:class steam, workspace 7 silent
# Nuclear Throne -> workspace 8
windowrule = match:class steam_app_242680, workspace 8 silent

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,gtk3 # change to qt6ct if you have that

# $gtk-schema = org.gnome.desktop.interface

general {
    gaps_in  = 0
    gaps_out = 0

    border_size = 0

    col.active_border = 0xffA7C080
    # col.active_border = 0xffA7C080 0xff7FBBB3 0xffe69875 45deg
    col.inactive_border = 0xff7A8478

    layout = scrolling
}

misc { 
    force_default_wallpaper = 1 
    disable_hyprland_logo = true 
}

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us, ru
    kb_variant = 
    kb_model = thinkpad
    kb_options = grp:alt_shift_toggle
    repeat_delay = 260
    kb_rules = 

    sensitivity = 0.2
    # force_no_accel = false
    # accel_profile = flat
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

decoration {
    rounding = 0
    inactive_opacity = 0.9
    # dim_inactive = true
    # dim_strength = 0.05
    shadow {
        range = 20
    }

    blur {
        enabled = yes
        size = 2
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = true
    }
}

bezier = smooth, 0.5, 0, 0.5, 1

animations {
    enabled = 1

    animation = windowsIn,   1, 2, smooth, slide
    animation = windowsOut,  1, 2, smooth, popin
    animation = windowsMove, 1, 2, smooth
    animation = border,      0, 2, default
    animation = fadeIn,      1, 1, default
    animation = workspaces,  0, 2, smooth, slidevert
}

layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = waybar
}

# cursor {
#     no_hardware_cursors = true
# }

# dwindle {
#     pseudotile = true
#     preserve_split = true
#     force_split = 2
# }

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    focus_fit_method = 1
    follow_focus = true
    direction = right
}

bind = SUPER, l, layoutmsg, move +col
bind = SUPER, h, layoutmsg, move -col
bind = SUPER CTRL, k, layoutmsg, swapcol r
bind = SUPER CTRL, j, layoutmsg, swapcol l
bind = SUPER CTRL, f, layoutmsg, colresize 1
binde = SUPER CTRL, PERIOD, layoutmsg, colresize +0.1
binde = SUPER CTRL, COMMA, layoutmsg, colresize -0.1
binde = SUPER CTRL, right, layoutmsg, promote

bind = SUPER, j,  movefocus, d
bind = SUPER, k,     movefocus, u


windowrule = match:class .*, suppress_event maximize


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# applications

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
## Binds
binds {
    allow_workspace_cycles = true
}

# toggle waybar
bind = SUPER, W, exec, killall -SIGUSR1 waybar

# volume
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = SUPER_CTRL, m, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = SUPER_CTRL, u, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = SUPER_CTRL, l, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bind  = SUPER_CTRL, P, exec, playerctl play-pause

# brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set +2%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 2%-

# screenshots
bind = ,Print, exec, GRIM_DEFAULT_DIR=~/Pictures/Screenshots/ grim
bind = SUPER,       Print, exec, slurp | GRIM_DEFAULT_DIR=~/Pictures/Screenshots/ grim -g -
bind = SUPER_SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# applications
bind = SUPER, RETURN, exec, $terminal -e $shell
bind = SUPER_CTRL, B, exec, $terminal -e $taskman
bind = SUPER,      B, exec, $browser
bind = SUPER_CTRL, T, exec, /home/anchous/.local/bin/start_tor_browser.sh
bind = SUPER,      E, exec, kitty -e $fileManager

# websites
bind = SUPER_SHIFT, P, exec, $browser "phind.com"
# bind = SUPER_SHIFT, T, exec, $browser "https://www.deepl.com/en/translator"

# monitors
bind = SUPER CTRL, j, focusmonitor, d
bind = SUPER CTRL, k, focusmonitor, u

bind = SUPER CTRL, s, exec, /home/anchous/.local/bin/screens.sh

# windows
bind = SUPER,       F, fullscreen
bind = SUPER,       C, killactive, 
bind = SUPER,       V, togglefloating, 
# bind = SUPER,       G, togglesplit

bind = SUPER,       D, exec, $menu
# bind = SUPER,       W, exec, $windows

# bind = SUPER,       P, pseudo, 
bind = SUPER_SHIFT, Q, exit
bind = SUPER_SHIFT, L, exec, hyprlock

# bind = SUPER SHIFT, H, movewindow, l
# bind = SUPER SHIFT, L, movewindow, r
# bind = SUPER SHIFT, K, movewindow, u
# bind = SUPER SHIFT, J, movewindow, d 

# bind = SUPER, left,  movefocus, l
# bind = SUPER, h,     movefocus, l
# bind = SUPER, right, movefocus, r
# bind = SUPER, l,     movefocus, r
# bind = SUPER, up,    movefocus, u
# bind = SUPER, k,     movefocus, u
# bind = SUPER, down,  movefocus, d
# bind = SUPER, j,     movefocus, d

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER_SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER_SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER_SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER_SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER_SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER_SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER_SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER_SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER_SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER_SHIFT, 0, movetoworkspacesilent, 10

# bind = SUPER_SHIFT, P, togglespecialworkspace
# bind = SUPER_CTRL_SHIFT, S, movetoworkspace, special

bind = SUPER, q, workspace, previous

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# GTK Settings
# exec-once = gsettings set $gtk-schema gtk-theme    "Gruvbox-Material-Dark"
# exec-once = gsettings set $gtk-schema icon-theme   "Gruvbox-Material-Dark"
# exec-once = gsettings set $gtk-schema cursor-theme "Breeze Light"
# exec-once = gsettings set $gtk-schema font-name    "JetBrainsMono Nerd Font 16"
# Set GTK Theme, Icons, and Fonts using the correct schema
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Gruvbox-Material-Dark"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Gruvbox-Material-Dark"
exec-once = gsettings set org.gnome.desktop.interface font-name "JetBrainsMono Nerd Font 15"

# Force the theme for all GTK applications (especially libadwaita/GTK4 apps like pavucontrol)
env = GTK_THEME,Gruvbox-Material-Dark

